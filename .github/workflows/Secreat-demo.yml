name: UsingSecretsDemo

on:
  push:
    branches: ["main"]

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use secret safely
        env:
          SECRET_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          echo "Secret is being used safely"
          echo "Accessing secret from environment variable"
          echo "Value is: $SECRET_KEY"
